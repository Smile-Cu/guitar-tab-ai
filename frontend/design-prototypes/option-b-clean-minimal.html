<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>方案 B · 清新简约</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f8fafc; color: #1e293b; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .app { max-width: 760px; margin: 0 auto; padding: 60px 24px; }

  .brand { text-align: center; margin-bottom: 48px; }
  .brand .icon { font-size: 2.2rem; margin-bottom: 8px; }
  .brand h1 { font-size: 1.8rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
  .brand p { font-size: 0.85rem; color: #64748b; }

  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }

  .upload-row { display: flex; gap: 12px; align-items: center; }
  .upload-row input[type=file] { flex: 1; padding: 10px; border: 2px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; font-size: 0.85rem; color: #64748b; cursor: pointer; transition: border-color .2s; }
  .upload-row input[type=file]:hover { border-color: #2563eb; }
  .upload-row button { padding: 12px 28px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .upload-row button:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.25); }
  .upload-row button:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

  .mode-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-bottom: 16px; }
  .mode-tag.ai { background: #dbeafe; color: #1e40af; }
  .mode-tag.mock { background: #fef3c7; color: #92400e; }
  .mode-tag .dot { width: 6px; height: 6px; border-radius: 50%; }
  .mode-tag.ai .dot { background: #2563eb; }
  .mode-tag.mock .dot { background: #f59e0b; }

  .section-title { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }

  .tab-view { background: #0f172a; border-radius: 10px; padding: 24px 20px; font-family: "SF Mono","Cascadia Code",monospace; font-size: 0.82rem; line-height: 2; color: #e2e8f0; overflow-x: auto; white-space: pre; }
  .tab-view .notenum { color: #38bdf8; }

  .fretboard-card { background: #faf5eb; border-radius: 10px; padding: 20px; text-align: center; }
  .fretboard-card svg { max-width: 100%; }

  .data-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.8rem; }
  .data-table th { background: #f1f5f9; color: #475569; padding: 10px 14px; text-align: center; font-weight: 600; font-size: 0.7rem; letter-spacing: 1px; }
  .data-table th:first-child { border-radius: 8px 0 0 0; }
  .data-table th:last-child { border-radius: 0 8px 0 0; }
  .data-table td { padding: 9px 14px; text-align: center; border-bottom: 1px solid #f1f5f9; color: #334155; }
  .data-table tr:last-child td:first-child { border-radius: 0 0 0 8px; }
  .data-table tr:last-child td:last-child { border-radius: 0 0 8px 0; }
  .data-table tr:hover td { background: #f8fafc; }

  .footer { text-align: center; margin-top: 40px; font-size: 0.75rem; color: #94a3b8; }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <div class="icon">🎸</div>
    <h1>GuitarTab AI</h1>
    <p>上传音频，AI 自动生成吉他六线谱</p>
  </div>

  <div class="card">
    <div class="upload-row">
      <input type="file" accept="audio/*" />
      <button>解析音频</button>
    </div>
  </div>

  <div class="mode-tag ai"><span class="dot"></span>AI 模式</div>

  <div class="card">
    <div class="section-title">六线谱</div>
    <pre class="tab-view">1(e) |  <span class="notenum">0</span>  --  --
2(B) |  --  <span class="notenum">2</span>  --
3(G) |  --  --  --
4(D) |  --  --  <span class="notenum">2</span>
5(A) |  --  <span class="notenum">2</span>  --
6(E) |  <span class="notenum">0</span>  --  --</pre>
  </div>

  <div class="card fretboard-card">
    <div class="section-title">指板位置</div>
    <svg width="480" height="200" viewBox="0 0 480 200">
      <rect width="480" height="200" fill="#faf5eb" rx="4"/>
      <line x1="50" y1="30" x2="450" y2="30" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="50" y1="62" x2="450" y2="62" stroke="#94a3b8" stroke-width="1"/>
      <line x1="50" y1="94" x2="450" y2="94" stroke="#94a3b8" stroke-width="1.3"/>
      <line x1="50" y1="126" x2="450" y2="126" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="50" y1="158" x2="450" y2="158" stroke="#94a3b8" stroke-width="1.8"/>
      <line x1="50" y1="190" x2="450" y2="190" stroke="#64748b" stroke-width="2.2"/>
      <line x1="50" y1="30" x2="50" y2="190" stroke="#c5a880" stroke-width="2.5"/>
      <line x1="130" y1="30" x2="130" y2="190" stroke="#e2d5c3" stroke-width="1"/>
      <line x1="210" y1="30" x2="210" y2="190" stroke="#e2d5c3" stroke-width="1"/>
      <line x1="290" y1="30" x2="290" y2="190" stroke="#e2d5c3" stroke-width="1"/>
      <line x1="370" y1="30" x2="370" y2="190" stroke="#e2d5c3" stroke-width="1"/>
      <line x1="450" y1="30" x2="450" y2="190" stroke="#e2d5c3" stroke-width="1"/>
      <circle cx="170" cy="110" r="4" fill="#c5a880"/>
      <circle cx="330" cy="110" r="4" fill="#c5a880"/>
      <circle cx="50" cy="190" r="10" fill="#2563eb" opacity="0.9"/><text x="50" y="194" font-size="8" fill="white" text-anchor="middle" font-weight="bold">E2</text>
      <circle cx="130" cy="158" r="10" fill="#2563eb" opacity="0.9"/><text x="130" y="162" font-size="8" fill="white" text-anchor="middle" font-weight="bold">B2</text>
      <circle cx="290" cy="126" r="10" fill="#2563eb" opacity="0.9"/><text x="290" y="130" font-size="8" fill="white" text-anchor="middle" font-weight="bold">E3</text>
      <text x="30" y="34" font-size="10" fill="#64748b" text-anchor="middle">e</text>
      <text x="30" y="66" font-size="10" fill="#64748b" text-anchor="middle">B</text>
      <text x="30" y="98" font-size="10" fill="#64748b" text-anchor="middle">G</text>
      <text x="30" y="130" font-size="10" fill="#64748b" text-anchor="middle">D</text>
      <text x="30" y="162" font-size="10" fill="#64748b" text-anchor="middle">A</text>
      <text x="30" y="194" font-size="10" fill="#64748b" text-anchor="middle">E</text>
      <text x="50" y="205" font-size="9" fill="#94a3b8" text-anchor="middle">0</text>
      <text x="130" y="205" font-size="9" fill="#94a3b8" text-anchor="middle">2</text>
      <text x="210" y="205" font-size="9" fill="#94a3b8" text-anchor="middle">3</text>
      <text x="290" y="205" font-size="9" fill="#94a3b8" text-anchor="middle">5</text>
    </svg>
  </div>

  <div class="card">
    <div class="section-title">音符数据</div>
    <table class="data-table">
      <thead><tr><th>弦号</th><th>品位</th><th>音符</th><th>开始</th><th>结束</th></tr></thead>
      <tbody>
        <tr><td>6弦 (E)</td><td>0 品</td><td>E2</td><td>0.00s</td><td>0.50s</td></tr>
        <tr><td>5弦 (A)</td><td>2 品</td><td>B2</td><td>0.50s</td><td>1.00s</td></tr>
        <tr><td>4弦 (D)</td><td>2 品</td><td>E3</td><td>1.00s</td><td>1.50s</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">GuitarTab AI — 用 AI 帮你扒谱</div>
</div>
</body>
</html>
